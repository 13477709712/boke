{% extends 'base.html' %}

{% block logo %}{% endblock %}

{% block title %}写文章 - 我的博客{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.10.3/dist/index.css" />
{% endblock %}

{% block content %}
<div class="form-container editor-container">
    <h1>写文章</h1>
    <form method="post">
        <div class="form-group">
            <label for="title">文章标题</label>
            <input type="text" id="title" name="title" required placeholder="请输入文章标题">
        </div>
        <div class="form-group">
            <label for="category">分类</label>
            <select id="category" name="category_id">
                <option value="">无分类</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="vditor"></div>
        <textarea name="content" style="display:none"></textarea>
        <button type="submit" class="btn btn-primary submit-btn">发布文章</button>
    </form>
    <a href="{{ url_for('index') }}" class="write-footer-logo">我的博客</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/vditor@3.10.3/dist/index.min.js"></script>
<script>
(function() {
    var vditor = new Vditor('vditor', {
        height: 640,
        mode: 'ir',
        placeholder: '开始写文章吧...',
        upload: {
            url: '{{ url_for("upload_image") }}',
            fieldName: 'editormd-image-file',
        },
        toolbar: [
            'emoji', 'headings', 'bold', 'italic', 'strike', '|',
            'list', 'ordered-list', 'check', '|',
            'code', 'code-block', 'table', 'link', 'image', '|',
            'preview', 'fullscreen', 'outline'
        ],
        cache: false
    });

    document.querySelector('form').addEventListener('submit', function() {
        document.querySelector('textarea[name="content"]').value = vditor.getValue();
    });
})();
</script>
{% endblock %}
